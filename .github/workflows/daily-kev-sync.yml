name: Daily KEV Sync

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Fetch KEV and rebuild counts
        run: python3 scripts/build_kev_counts.py --format json

      - name: Enrich EPSS scores
        run: python3 scripts/enrich_epss.py

      - name: Enrich NVD data
        run: python3 scripts/enrich_nvd.py --skip-existing

      - name: Enrich KEV metadata
        # enrich_kev.py reads and writes the same file; use a temp file to avoid
        # truncating the input before the write is complete.
        run: |
          python3 scripts/enrich_kev.py > scripts/kev_edge_enriched.json.tmp
          mv scripts/kev_edge_enriched.json.tmp scripts/kev_edge_enriched.json

      - name: Check for changes
        id: diff
        run: |
          git diff --exit-code scripts/kev_edge_counts.json scripts/kev_edge_enriched.json \
            && echo "changed=false" >> "$GITHUB_OUTPUT" \
            || echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Build PR body
        if: steps.diff.outputs.changed == 'true'
        id: pr_body
        run: |
          python3 - <<'PYEOF'
          import json, os, subprocess

          # Vendor counts from the freshly-built file
          with open('scripts/kev_edge_counts.json') as f:
              data = json.load(f)

          counts = {}
          meta = {}
          # Support both flat {vendor: [...]} and {_metadata: {...}, vendor: [...]} shapes
          for k, v in data.items():
              if k == '_metadata':
                  meta = v if isinstance(v, dict) else {}
              elif isinstance(v, list):
                  counts[k] = len(v)

          # Fall back to embedded counts if the list-based parse yields nothing
          if not counts and 'counts' in meta:
              counts = meta['counts']

          total = sum(counts.values())

          # Which vendors changed vs HEAD?
          raw = subprocess.run(
              ['git', 'diff', 'HEAD', 'scripts/kev_edge_counts.json'],
              capture_output=True, text=True
          ).stdout
          changed_vendors = sorted({
              line.lstrip('+-').split(':')[0].strip().strip('"')
              for line in raw.splitlines()
              if line.startswith(('+', '-'))
              and line[1:2] not in ('+', '-')   # skip diff-header lines
              and '"' in line
              and ':' in line
          })
          changed_str = ', '.join(changed_vendors) if changed_vendors else 'metadata/enrichment only'

          lines = [
              '## Daily KEV dataset update',
              '',
              f'**Total CVEs tracked:** {total} across {len(counts)} vendors',
              '',
              '### Vendor counts',
              '',
              '| Vendor | CVEs |',
              '|--------|------|',
          ]
          for vendor, cnt in sorted(counts.items(), key=lambda x: -x[1]):
              lines.append(f'| {vendor} | {cnt} |')

          lines += [
              '',
              '### What changed',
              '',
              f'Vendors with modified entries: **{changed_str}**',
              '',
              '### Review checklist',
              '',
              '- [ ] Vendor CVE counts match expected ranges (Fortinet 18, Cisco 13, Citrix 13, Ivanti 13, Palo Alto Networks 12, SonicWall 12, Juniper 8, F5 6, Sophos 6, Zyxel 6, WatchGuard 4, Check Point 2, Array Networks 2)',
              '- [ ] No unexpected vendor additions or removals',
              '- [ ] EPSS and NVD enrichment metadata looks reasonable',
              '- [ ] Diff is limited to `scripts/kev_edge_counts.json` and `scripts/kev_edge_enriched.json`',
          ]

          body = '\n'.join(lines)
          # Write to GITHUB_OUTPUT as a multiline value
          with open(os.environ['GITHUB_OUTPUT'], 'a') as out:
              out.write('body<<BODY_EOF\n')
              out.write(body + '\n')
              out.write('BODY_EOF\n')
          PYEOF

      - name: Open pull request
        if: steps.diff.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: kev-sync/auto-update
          base: master
          title: "chore: daily KEV sync + re-enrichment (${{ github.run_number }})"
          body: ${{ steps.pr_body.outputs.body }}
          labels: |
            automated
            dataset-update
          commit-message: "chore: daily KEV sync + re-enrichment"
          author: "github-actions[bot] <41898282+github-actions[bot]@users.noreply.github.com>"

      - name: No changes
        if: steps.diff.outputs.changed == 'false'
        run: echo "::notice::No changes to KEV edge counts or enriched data"

      - name: Job summary
        run: |
          echo "## KEV Edge Counts" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Vendor | CVE Count |" >> "$GITHUB_STEP_SUMMARY"
          echo "|--------|-----------|" >> "$GITHUB_STEP_SUMMARY"
          python3 -c "
          import json
          with open('scripts/kev_edge_counts.json') as f:
              data = json.load(f)
          counts = data.get('_metadata', {}).get('counts', {})
          if not counts:
              counts = {k: len(v) for k, v in data.items() if isinstance(v, list)}
          for vendor, count in sorted(counts.items(), key=lambda x: -x[1]):
              print(f'| {vendor} | {count} |')
          " >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "## Enrichment Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Metric | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|--------|-------|" >> "$GITHUB_STEP_SUMMARY"
          python3 -c "
          import json
          with open('scripts/kev_edge_enriched.json') as f:
              data = json.load(f)
          meta = data.get('_metadata', {})
          rows = [
              ('Total CVEs', meta.get('total_cves', '?')),
              ('EPSS found', meta.get('epss_found', '?')),
              ('NVD fetched', meta.get('nvd_fetched', '?')),
              ('NVD skipped (already enriched)', meta.get('nvd_skipped', '?')),
              ('NVD errors', meta.get('nvd_errors', '?')),
              ('KEV catalog hits', meta.get('kev_found', '?')),
              ('Enriched at', meta.get('generated_at', meta.get('kev_enriched_at', '?'))),
          ]
          for label, val in rows:
              print(f'| {label} | {val} |')
          " >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Changed: **${{ steps.diff.outputs.changed }}**" >> "$GITHUB_STEP_SUMMARY"
